<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio San Rafael</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  transition: background 2s;
  overflow: hidden;
}

/* reloj */
#hora {
  position: absolute;
  top: 10px;
  left: 20px;
  color: blue;
  font-size: 26px;
  font-weight: bold;
  z-index: 20;
}

/* logo esquina */
#logoTop {
  position: absolute;
  top: 10px;
  right: 20px;
  width: 90px;
  z-index: 20;
}

/* logo central */
#logoCentral {
  width: 260px;
  animation: latido 1.5s infinite;
}

@keyframes latido {
  0% { transform: scale(1) }
  25% { transform: scale(1.1) }
  40% { transform: scale(1) }
  60% { transform: scale(1.1) }
  100% { transform: scale(1) }
}

/* botones */
.btn-estilo {
  margin-top: 10px;
  padding: 15px 35px;
  color: white;
  border: none;
  font-size: 20px;
  border-radius: 10px;
  cursor: pointer;
  display: block;
  width: 100%;
}

#btnRadio { background: #007BFF; }
#btnYoutube { background: #FF0000; }

/* gif */
#gif {
  position: absolute;
  bottom: 10px;
  left: 10px;
  z-index: 20;
}

#gif img {
  width: 120px;
}

/* contenido principal */
#contenido {
  text-align: center;
  z-index: 10;
}

/* CONTENEDOR YOUTUBE (PANTALLA COMPLETA) */
#youtubeContainer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: none; /* Se activa con el botón */
  background: #000;
  z-index: 15;
}

#youtubeContainer iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Botón para cerrar el video y volver a la radio */
#btnCerrarVideo {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.7);
  border: none;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
  z-index: 30;
  display: none;
}
</style>
</head>

<body>

<div id="hora"></div>
<img src="logo.png" id="logoTop">

<button id="btnCerrarVideo" onclick="cerrarVideo()">❌ VOLVER A LA RADIO</button>

<div id="contenido">
  <img src="logo.png" id="logoCentral">
  <br><br>
  <button id="btnRadio" class="btn-estilo" onclick="playRadio()">🎧 ESCUCHANOS EN VIVO</button>
  <button id="btnYoutube" class="btn-estilo" onclick="activarVideo()">📺 VER VIDEO EN VIVO</button>
  
  <audio id="radio" src="https://stream.zeno.fm"></audio>
</div>

<div id="gif">
  <a href="https://alanjavier198245-debug.github.io" target="_blank">
    <img src="animacion.gif">
  </a>
</div>

<div id="youtubeContainer">
  <!-- El iframe se cargará aquí solo al presionar el botón -->
</div>

<script>
/* Reloj */
function reloj() {
  let d = new Date();
  document.getElementById("hora").innerHTML = d.getHours().toString().padStart(2,"0") + ":" + 
                                              d.getMinutes().toString().padStart(2,"0") + ":" + 
                                              d.getSeconds().toString().padStart(2,"0");
}
setInterval(reloj, 1000);

/* Radio */
function playRadio() {
  document.getElementById("radio").play();
}

/* Fondo aleatorio */
const colores = ["blue", "red", "green", "yellow"];
function fondo() {
  document.body.style.background = colores[Math.floor(Math.random() * colores.length)];
}
setInterval(fondo, 4000);

/* --- FUNCIONES DE VIDEO --- */

const canalID = "UC9sQKx-dhwB2i-53vkxCiPw";

function activarVideo() {
  const container = document.getElementById("youtubeContainer");
  const contenido = document.getElementById("contenido");
  const btnCerrar = document.getElementById("btnCerrarVideo");
  const radio = document.getElementById("radio");

  // 1. Pausamos la radio para que no se mezclen sonidos
  radio.pause();

  // 2. Ocultamos el contenido central y el gif
  contenido.style.display = "none";
  document.getElementById("gif").style.display = "none";

  // 3. Mostramos el contenedor de YouTube y el botón de cerrar
  container.style.display = "block";
  btnCerrar.style.display = "block";

  // 4. Insertamos el reproductor de YouTube
  container.innerHTML = `<iframe src="https://www.youtube.com{canalID}&autoplay=1&mute=0&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

function cerrarVideo() {
  const container = document.getElementById("youtubeContainer");
  const contenido = document.getElementById("contenido");
  const btnCerrar = document.getElementById("btnCerrarVideo");

  // 1. Vaciamos el contenedor (para que el video deje de sonar)
  container.innerHTML = "";
  container.style.display = "none";
  btnCerrar.style.display = "none";

  // 2. Mostramos de nuevo la radio
  contenido.style.display = "block";
  document.getElementById("gif").style.display = "block";
}
</script>

</body>
</html>
