<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio San Rafael</title>
<!-- CONECTAMOS EL ARCHIVO DEL ID -->
<script src="vivo.js"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  transition: background 2s;
  overflow: hidden;
}

#hora { position: absolute; top: 10px; left: 20px; color: blue; font-size: 26px; font-weight: bold; z-index: 20; }
#logoTop { position: absolute; top: 10px; right: 20px; width: 90px; z-index: 20; }
#logoCentral { width: 260px; animation: latido 1.5s infinite; }

@keyframes latido {
  0% { transform: scale(1) }
  25% { transform: scale(1.1) }
  40% { transform: scale(1) }
  60% { transform: scale(1.1) }
  100% { transform: scale(1) }
}

.btn-estilo {
  margin-top: 10px;
  padding: 15px 35px;
  color: white;
  border: none;
  font-size: 20px;
  border-radius: 10px;
  cursor: pointer;
  display: block;
  width: 100%;
}

#btnRadio { background: #007BFF; }
#btnYoutube { background: #FF0000; }

#gif { position: absolute; bottom: 10px; left: 10px; z-index: 20; }
#gif img { width: 120px; }

#contenido { text-align: center; z-index: 10; }

#youtubeContainer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: none;
  background: #000;
  z-index: 15;
}

#youtubeContainer iframe { width: 100%; height: 100%; border: none; }

#btnCerrarVideo {
  position: absolute;
  top: 20px;
  right: 20px;
  background: white;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  cursor: pointer;
  z-index: 30;
  display: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="hora"></div>
<img src="logo.png" id="logoTop">

<button id="btnCerrarVideo" onclick="cerrarVideo()">❌ VOLVER A LA RADIO</button>

<div id="contenido">
  <img src="logo.png" id="logoCentral">
  <br><br>
  <button id="btnRadio" class="btn-estilo" onclick="playRadio()">🎧 ESCUCHANOS EN VIVO</button>
  <button id="btnYoutube" class="btn-estilo" onclick="activarVideo()">📺 VER VIDEO EN VIVO</button>
  
  <audio id="radio" src="https://stream.zeno.fm"></audio>
</div>

<div id="gif">
  <a href="https://alanjavier198245-debug.github.io" target="_blank">
    <img src="animacion.gif">
  </a>
</div>

<div id="youtubeContainer"></div>

<script>
/* Reloj y Fondo */
function reloj() {
  let d = new Date();
  document.getElementById("hora").innerHTML = d.getHours().toString().padStart(2,"0") + ":" + 
                                              d.getMinutes().toString().padStart(2,"0") + ":" + 
                                              d.getSeconds().toString().padStart(2,"0");
}
setInterval(reloj, 1000);

function playRadio() { document.getElementById("radio").play(); }

const colores = ["blue", "red", "green", "yellow"];
setInterval(() => {
  document.body.style.background = colores[Math.floor(Math.random() * colores.length)];
}, 4000);

/* --- FUNCIONES DE VIDEO --- */

function activarVideo() {
  const container = document.getElementById("youtubeContainer");
  const btnCerrar = document.getElementById("btnCerrarVideo");

  document.getElementById("radio").pause();
  document.getElementById("contenido").style.display = "none";
  document.getElementById("gif").style.display = "none";

  container.style.display = "block";
  btnCerrar.style.display = "block";

  // El reproductor ahora usa la variable que vive en vivo.js
  container.innerHTML = '<iframe src="https://www.youtube.com' + ID_YOUTUBE_VIVO + '?autoplay=1&mute=0&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';


function cerrarVideo() {
  document.getElementById("youtubeContainer").innerHTML = "";
  document.getElementById("youtubeContainer").style.display = "none";
  document.getElementById("btnCerrarVideo").style.display = "none";
  document.getElementById("contenido").style.display = "block";
  document.getElementById("gif").style.display = "block";
}
</script>

</body>
</html>
