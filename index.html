<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio UGA - En Vivo</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }

        /* FONDO DE TWITCH */
        #twitch-embed {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }
        #twitch-embed iframe { width: 100%; height: 100%; }

        /* CAPA DE INTERACCIÓN */
        #interaction-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            cursor: pointer;
        }

        /* ELEMENTOS UI */
        #secondary-logo {
            position: absolute; top: 1.5rem; right: 1.5rem;
            width: 80px; z-index: 10;
            pointer-events: none;
        }

        #time-display {
            position: absolute; top: 1.5rem; left: 1.5rem;
            color: white; background: rgba(0,0,0,0.6);
            padding: 0.6rem 1.2rem; border-radius: 12px;
            font-size: 1.2rem; font-weight: bold;
            z-index: 10; backdrop-filter: blur(5px);
        }

        .btn-control {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 1.2rem 2.5rem; font-size: 1.1rem;
            font-weight: bold; color: white; border: none;
            border-radius: 50px; cursor: pointer;
            z-index: 15; transition: opacity 0.5s ease;
        }

        #live-button { background: #2563eb; box-shadow: 0 0 30px rgba(37,99,235,0.6); }
        #stop-button { background: #dc2626; box-shadow: 0 0 30px rgba(220,38,38,0.6); display: none; opacity: 0; }

        #left-gif {
            position: absolute; left: 1.5rem; bottom: 1.5rem;
            width: 90px; z-index: 10; cursor: pointer;
        }
    </style>
</head>

<body>

<div id="twitch-embed"></div>
<div id="interaction-layer"></div>

<img src="logo.png" id="secondary-logo">
<div id="time-display"><span id="current-time"></span></div>
<a href="https://sites.google.com" target="_blank">
    <img src="animacion.gif" id="left-gif">
</a>

<button id="live-button" class="btn-control">ESCÚCHANOS EN VIVO</button>
<button id="stop-button" class="btn-control">DETENER REPRODUCCIÓN</button>

<audio id="radio-player">
    <source src="https://stream.zeno.fm" type="audio/mpeg">
</audio>

<!-- SCRIPT DE TWITCH -->
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script type="text/javascript">
  var player;
  var options = {
    width: "100%",
    height: "100%",
    channel: "sanrafaelradio1",
    parent: ["alanjavier198245-debug.github.io"],
    autoplay: false, // Empezamos pausado para que el botón lo active
    muted: false
  };
  player = new Twitch.Player("twitch-embed", options);
</script>

<script>
const radio = document.getElementById('radio-player');
const liveBtn = document.getElementById('live-button');
const stopBtn = document.getElementById('stop-button');
const layer = document.getElementById('interaction-layer');
let hideTimeout;

// FUNCIÓN PARA REPRODUCIR TODO
liveBtn.addEventListener('click', () => {
    radio.play();        // Inicia el audio
    player.play();       // Inicia el video de Twitch
    liveBtn.style.display = "none";
});

// FUNCIÓN PARA DETENER TODO
stopBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    radio.pause();       // Pausa audio
    player.pause();      // Pausa Twitch
    stopBtn.style.display = "none";
    liveBtn.style.display = "block";
});

// Control visual de la capa
layer.addEventListener('click', () => {
    if (!radio.paused) {
        stopBtn.style.display = "block";
        setTimeout(() => stopBtn.style.opacity = "1", 10);
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
            stopBtn.style.opacity = "0";
            setTimeout(() => stopBtn.style.display = "none", 500);
        }, 3000);
    }
});

function updateTime() {
    const now = new Date();
    document.getElementById('current-time').textContent = 
        now.getHours().toString().padStart(2, '0') + ":" + 
        now.getMinutes().toString().padStart(2, '0');
}
setInterval(updateTime, 1000); 
updateTime();
</script>

</body>
</html>
