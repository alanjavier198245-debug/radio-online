<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio UGA - Estás en línea!!</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    overflow: hidden;
    background: linear-gradient(90deg, #1e3a8a, #dc2626, #22c55e, #1e3a8a);
    background-size: 300% 300%;
    animation: gradientAnimation 15s ease infinite;
}

@keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    33% { background-position: 100% 50%; }
    66% { background-position: 200% 50%; }
    100% { background-position: 0% 50%; }
}

.radio-container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#main-logo {
    max-width: 96%;
    max-height: 48vh;
    margin-bottom: 2rem;
    animation: heartbeat 1.5s ease infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

#left-gif {
    position: absolute;
    left: 1rem;
    bottom: 1rem;
    width: 100px;
    cursor: pointer;
    z-index: 5;
}

/* BOTÓN COMENTAR */
#comment-button {
    position: absolute;
    right: 1rem;
    bottom: 1rem;
    padding: 0.7rem 1.8rem;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    z-index: 5;
}

/* CONTENEDOR FLOTANTE */
#floating-comments {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
}

/* ESTILO COMENTARIO FLOTANTE */
.comment-bubble {
    position: absolute;
    bottom: 0;
    left: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    color: white;
    padding: 10px 15px;
    border-radius: 20px;
    font-size: 0.85rem;
    animation: floatUp 6s linear forwards;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(-400px); opacity: 0; }
}

/* MODAL */
#comment-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.modal-content {
    background: #0f172a;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    color: white;
}

.modal-content input,
.modal-content textarea {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

.modal-content button {
    padding: 10px;
    border-radius: 50px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<img src="animacion.gif" id="left-gif">

<div id="floating-comments"></div>
<button id="comment-button">COMENTAR</button>

<div id="comment-modal">
    <div class="modal-content">
        <input type="text" id="name-input" placeholder="Tu nombre">
        <textarea id="comment-input" placeholder="Escribe tu comentario"></textarea>
        <button id="send-comment">ENVIAR</button>
    </div>
</div>

<div class="radio-container">
    <img src="logo.png" id="main-logo">

    <button id="live-button">ESCÚCHANOS EN VIVO</button>

    <audio id="radio-player">
        <source src="https://stream.zeno.fm/pngmqyzqcuhvv" type="audio/mpeg">
    </audio>
</div>

<!-- SONIDO -->
<audio id="comment-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const leftGif = document.getElementById('left-gif');
const commentButton = document.getElementById('comment-button');
const modal = document.getElementById('comment-modal');
const sendBtn = document.getElementById('send-comment');
const nameInput = document.getElementById('name-input');
const commentInput = document.getElementById('comment-input');
const floatingContainer = document.getElementById('floating-comments');
const sound = document.getElementById('comment-sound');

let comments = JSON.parse(localStorage.getItem("comments")) || [];

/* GIF ABRE TU URL */
leftGif.addEventListener('click', () => {
    window.open("https://sites.google.com/view/sanrafaelradio/inicio", "_blank");
});

/* MOSTRAR COMENTARIO FLOTANTE */
function createFloatingComment(name, text) {
    const bubble = document.createElement("div");
    bubble.className = "comment-bubble";
    bubble.style.left = Math.random() * 60 + "%";
    bubble.innerHTML = "📡 <strong>" + name + ":</strong> " + text;

    floatingContainer.appendChild(bubble);
    sound.play();

    setTimeout(() => {
        bubble.remove();
    }, 6000);
}

/* ABRIR MODAL */
commentButton.addEventListener('click', () => {
    modal.style.display = "flex";
});

/* ENVIAR COMENTARIO */
sendBtn.addEventListener('click', () => {
    if (nameInput.value.trim() && commentInput.value.trim()) {
        const newComment = {
            name: nameInput.value,
            comment: commentInput.value
        };

        comments.push(newComment);
        localStorage.setItem("comments", JSON.stringify(comments));

        createFloatingComment(newComment.name, newComment.comment);

        nameInput.value = "";
        commentInput.value = "";
        modal.style.display = "none";
    }
});

/* CERRAR MODAL */
modal.addEventListener('click', e => {
    if (e.target === modal) modal.style.display = "none";
});

/* MOSTRAR ALEATORIOS CADA 8 SEGUNDOS */
setInterval(() => {
    if (comments.length > 0) {
        const random = comments[Math.floor(Math.random() * comments.length)];
        createFloatingComment(random.name, random.comment);
    }
}, 8000);
</script>

</body>
</html>
