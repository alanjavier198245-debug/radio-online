<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio San Rafael</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
transition:background 2s;
overflow:hidden;
}

/* reloj */

#hora{
position:absolute;
top:10px;
left:20px;
color:blue;
font-size:26px;
font-weight:bold;
}

/* logo esquina */

#logoTop{
position:absolute;
top:10px;
right:20px;
width:90px;
}

/* logo central */

#logoCentral{
width:260px;
animation:latido 1.5s infinite;
}

/* latido */

@keyframes latido{
0%{transform:scale(1)}
25%{transform:scale(1.1)}
40%{transform:scale(1)}
60%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* boton */

#btnRadio{
margin-top:20px;
padding:15px 35px;
background:#007BFF;
color:white;
border:none;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

/* gif */

#gif{
position:absolute;
bottom:10px;
left:10px;
}

#gif img{
width:120px;
}

/* contenido */

#contenido{
text-align:center;
}

/* twitch */

#twitchContainer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

#twitchContainer iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div id="hora"></div>

<img src="logo.png" id="logoTop">

<div id="contenido">

<img src="logo.png" id="logoCentral">

<br>

<button id="btnRadio" onclick="playRadio()">ESCUCHANOS EN VIVO</button>

<audio id="radio" src="https://stream.zeno.fm/pngmqyzqcuhvv"></audio>

</div>

<div id="gif">
<a href="https://alanjavier198245-debug.github.io/Confec4a./" target="_blank">
<img src="animacion.gif">
</a>
</div>

<div id="twitchContainer">

<iframe
src="https://player.twitch.tv/?channel=sanrafaelradio1&parent=localhost&autoplay=true"
allowfullscreen>
</iframe>

</div>

<script>

/* reloj */

function reloj(){
let d=new Date();
let h=d.getHours().toString().padStart(2,"0");
let m=d.getMinutes().toString().padStart(2,"0");
let s=d.getSeconds().toString().padStart(2,"0");

document.getElementById("hora").innerHTML=h+":"+m+":"+s;
}

setInterval(reloj,1000);

/* radio */

function playRadio(){
document.getElementById("radio").play();
}

/* fondo aleatorio */

const colores=["blue","red","green","yellow"];

function fondo(){
let c=colores[Math.floor(Math.random()*colores.length)];
document.body.style.background=c;
}

setInterval(fondo,4000);

/* modo twitch manual */

function activarTwitch(){

document.getElementById("contenido").style.display="none";
document.getElementById("gif").style.display="none";

document.getElementById("twitchContainer").style.display="block";

}

</script>

</body>
</html>
