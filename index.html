<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio San Rafael - Estás en línea!!</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    overflow: hidden;
    background: linear-gradient(90deg, #1e3a8a, #dc2626, #22c55e, #1e3a8a);
    background-size: 300% 300%;
    animation: gradientAnimation 15s ease infinite;
}

@keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    33% { background-position: 100% 50%; }
    66% { background-position: 200% 50%; }
    100% { background-position: 0% 50%; }
}

.radio-container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#main-logo {
    max-width: 96%;
    max-height: 48vh;
    margin-bottom: 2rem;
    animation: heartbeat 1.5s ease infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

#secondary-logo {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 70px;
}

#time-display {
    position: absolute;
    top: 1rem;
    left: 1rem;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 0.5rem 1rem;
    border-radius: 5px;
}

#left-gif {
    position: absolute;
    left: 1rem;
    bottom: 1rem;
    width: 100px;
    cursor: pointer;
}

/* BOTÓN RADIO */
#live-button {
    margin-top: 20px;
    padding: 0.75rem 2rem;
    font-size: 0.9rem;
    font-weight: bold;
    color: white;
    background-color: #2563eb;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(37,99,235,0.8);
}

/* BOTÓN COMENTAR */
#comment-button {
    position: absolute;
    right: 1rem;
    bottom: 1rem;
    padding: 0.7rem 1.8rem;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(34,197,94,0.7);
    transition: 0.3s;
}

#comment-button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(34,197,94,1);
}

/* CAJA DE COMENTARIO */
#random-comment {
    position: absolute;
    right: 1rem;
    bottom: 5.2rem;
    width: 280px;
    min-height: 60px;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5);
    color: #fff;
    padding: 15px;
    border-radius: 15px;
    font-size: 0.85rem;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* Animación tipo transmisión */
.live-animation {
    animation: slideIn 0.8s ease forwards;
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* MODAL */
#comment-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    color: white;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    animation: fadeIn 0.4s ease;
}

.modal-content input,
.modal-content textarea {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.modal-content button {
    padding: 10px;
    border-radius: 50px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<img src="animacion.gif" id="left-gif" alt="GIF animado">

<div id="random-comment">No hay comentarios aún.</div>
<button id="comment-button">COMENTAR</button>

<div id="comment-modal">
    <div class="modal-content">
        <input type="text" id="name-input" placeholder="Tu nombre">
        <textarea id="comment-input" placeholder="Escribe tu comentario"></textarea>
        <button id="send-comment">ENVIAR</button>
    </div>
</div>

<div class="radio-container">
    <img src="logo.png" id="secondary-logo">
    <img src="logo.png" id="main-logo">

    <div id="time-display">
        <span id="current-time">00:00</span>
    </div>

    <button id="live-button">ESCÚCHANOS EN VIVO</button>

    <audio id="radio-player">
        <source src="https://stream.zeno.fm/pngmqyzqcuhvv" type="audio/mpeg">
    </audio>
</div>

<script>
const radio = document.getElementById('radio-player');
const button = document.getElementById('live-button');
const timeEl = document.getElementById('current-time');
const leftGif = document.getElementById('left-gif');

leftGif.addEventListener('click', () => {
    window.open("https://sites.google.com/view/sanrafaelradio/inicio", "_blank");
});

button.addEventListener('click', () => {
    if (radio.paused) {
        radio.play();
        button.textContent = 'DETENER REPRODUCCIÓN';
        button.style.backgroundColor = '#dc2626';
    } else {
        radio.pause();
        button.textContent = 'ESCÚCHANOS EN VIVO';
        button.style.backgroundColor = '#2563eb';
    }
});

function updateTime() {
    const now = new Date();
    timeEl.textContent =
        String(now.getHours()).padStart(2,'0') + ":" +
        String(now.getMinutes()).padStart(2,'0');
}
setInterval(updateTime, 1000);
updateTime();

/* SISTEMA DE COMENTARIOS */
const commentButton = document.getElementById('comment-button');
const modal = document.getElementById('comment-modal');
const sendBtn = document.getElementById('send-comment');
const nameInput = document.getElementById('name-input');
const commentInput = document.getElementById('comment-input');
const randomCommentBox = document.getElementById('random-comment');

let comments = JSON.parse(localStorage.getItem("comments")) || [];

function showRandomComment() {
    if (comments.length === 0) {
        randomCommentBox.textContent = "No hay comentarios aún.";
        return;
    }

    const random = comments[Math.floor(Math.random() * comments.length)];

    randomCommentBox.classList.remove("live-animation");
    void randomCommentBox.offsetWidth;

    randomCommentBox.innerHTML =
        "📡 <strong>EN VIVO</strong><br><br>" +
        "<strong>" + random.name + ":</strong><br>" +
        random.comment;

    randomCommentBox.classList.add("live-animation");
}

commentButton.addEventListener('click', () => {
    modal.style.display = "flex";
});

sendBtn.addEventListener('click', () => {
    if (nameInput.value && commentInput.value) {
        comments.push({
            name: nameInput.value,
            comment: commentInput.value
        });
        localStorage.setItem("comments", JSON.stringify(comments));
        nameInput.value = "";
        commentInput.value = "";
        modal.style.display = "none";
        showRandomComment();
    }
});

modal.addEventListener('click', e => {
    if (e.target === modal) modal.style.display = "none";
});

setInterval(showRandomComment, 5000);
showRandomComment();
</script>

</body>
</html>
